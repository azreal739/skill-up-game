<div class="settings ea-page">
  <header>
    <p class="ea-eyebrow">Settings</p>
    <h1>Mission preferences</h1>
  </header>

  <section class="group ea-panel">
    <h2>Audio</h2>

    <label class="row">
      <span class="row__label">Mute all sound</span>
      <input
        type="checkbox"
        [checked]="gameState.settings().muted"
        (change)="onToggle('muted', $event)"
      />
    </label>

    <label class="row">
      <span class="row__label">Master volume</span>
      <input
        type="range"
        min="0"
        max="1"
        step="0.1"
        [value]="gameState.settings().masterVolume"
        (input)="onVolume('masterVolume', $event)"
      />
    </label>

    <label class="row">
      <span class="row__label">Sound effects</span>
      <input
        type="range"
        min="0"
        max="1"
        step="0.1"
        [value]="gameState.settings().sfxVolume"
        (input)="onVolume('sfxVolume', $event)"
      />
    </label>

    <label class="row">
      <span class="row__label">Music <em>(reserved for future ambience)</em></span>
      <input
        type="range"
        min="0"
        max="1"
        step="0.1"
        [value]="gameState.settings().musicVolume"
        (input)="onVolume('musicVolume', $event)"
      />
    </label>
  </section>

  <section class="group ea-panel">
    <h2>Accessibility</h2>

    <label class="row">
      <span class="row__label">Reduced motion</span>
      <input
        type="checkbox"
        [checked]="gameState.settings().reducedMotion"
        (change)="onToggle('reducedMotion', $event)"
      />
    </label>

    <label class="row">
      <span class="row__label">High contrast</span>
      <input
        type="checkbox"
        [checked]="gameState.settings().highContrast"
        (change)="onToggle('highContrast', $event)"
      />
    </label>

    <label class="row">
      <span class="row__label">Text size</span>
      <select [value]="gameState.settings().textScale" (change)="onTextScale($event)">
        <option [value]="0.9">Compact</option>
        <option [value]="1">Standard</option>
        <option [value]="1.15">Large</option>
        <option [value]="1.3">Extra large</option>
      </select>
    </label>
  </section>

  <section class="group ea-panel">
    <h2>Progress</h2>
    <p class="group__note">Wipes profile, progress, badges and settings stored on this device.</p>
    <button type="button" class="ea-btn ea-btn--danger" (click)="resetProgress()">
      Reset all progress
    </button>
  </section>
</div>
