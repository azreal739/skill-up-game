<h2>Black Jack</h2>
<div class="game-result" *ngIf="gameOver">
  <h3>{{ result }}</h3>
  <button class="play-again-button" (click)="resetGame()">Play Again</button>
</div>

@if (playerName && ready) {
<div class="game-board">
  <div class="hand-area">
    <h3>{{ playerName }}'s Hand ({{ playerScore }})</h3>
    <button
      class="player-action-button"
      (click)="playerHit()"
      [disabled]="!canAct"
    >
      Hit
    </button>
    <button
      class="player-action-button"
      (click)="stand()"
      [disabled]="!canAct"
    >
      Stand
    </button>
    <button
      class="player-action-button"
      (click)="doubleDown()"
      [disabled]="!canDoubleDown"
    >
      Double Down
    </button>
    <div class="cards">
      <div
        *ngFor="let card of playerCards"
        class="card"
        [ngClass]="{
          hearts: card.suit === '♥',
          diamonds: card.suit === '♦'
        }"
      >
        <span class="card-value">{{ card.value }}</span>
        <span class="card-suit">{{ card.suit }}</span>
      </div>
    </div>
  </div>
  <div class="hand-area">
    <h3>Dealer's Hand ({{ visibleDealerScore }})</h3>
    <div class="cards">
      <div
        *ngFor="let card of dealerCards; let i = index"
        class="card"
        [class.face-down]="holeCardHidden && i === 1"
        [ngClass]="{
          hearts: card.suit === '♥',
          diamonds: card.suit === '♦'
        }"
      >
        @if (holeCardHidden && i === 1) {
          <span class="card-back">🂠</span>
        } @else {
          <span class="card-value">{{ card.value }}</span>
          <span class="card-suit">{{ card.suit }}</span>
        }
      </div>
    </div>
  </div>
</div>

} @else {
<div class="player-setup">
  <input type="text" [(ngModel)]="playerName" placeholder="Enter your name" />
  <button (click)="startGame()" [disabled]="playerName.length === 0">Start Game</button>
</div>
}
