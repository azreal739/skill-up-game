<div class="container">
  <h2>🎯 New Year's Resolutions</h2>

  <div class="input-group">
    <input
      [(ngModel)]="newResolution"
      placeholder="Enter your resolution..."
      (keyup.enter)="saveResolution()"
      />
    <button (click)="saveResolution()">{{ isEditing ? 'Save' : 'Add' }}</button>
    @if (isEditing) {
      <button (click)="cancelEdit()" class="muted">Cancel</button>
    } @else {
      <button (click)="clearResolutions()" class="delete">Clear</button>
    }
  </div>

  <ul>
    @for (resolution of resolutions; track resolution; let i = $index) {
      <li [class.editing]="editingIndex === i">
        <span class="text">{{ resolution }}</span>
        <span class="actions">
          <button (click)="editResolution(i)" aria-label="Edit resolution">✏️</button>
          <button (click)="deleteResolution(i)" class="delete" aria-label="Delete resolution">❌</button>
        </span>
      </li>
    }
  </ul>
</div>
